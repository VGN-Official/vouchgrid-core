<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VouchGrid Core Network</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-teal: #0d9488;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --verified-green: #10b981;
            --pending-orange: #f59e0b;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 480px;
            margin-top: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        .header h1 {
            color: var(--accent-teal);
            margin: 0;
            font-size: 28px;
            letter-spacing: 1px;
        }
        .header p {
            color: var(--text-muted);
            margin: 5px 0 0 0;
            font-size: 14px;
        }
        /* Identity Banner */
        .auth-banner {
            background-color: var(--card-bg);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            width: 100%;
            box-sizing: border-box;
        }
        .auth-status {
            font-weight: 600;
        }
        .auth-btn {
            background-color: var(--accent-teal);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        /* Navigation Tabs Layout */
        .nav-tabs {
            display: flex;
            background-color: var(--card-bg);
            padding: 4px;
            border-radius: 8px;
            margin-bottom: 25px;
            border: 1px solid #334155;
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background-color: var(--accent-teal);
            color: white;
        }
        .card {
            background-color: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            margin-bottom: 20px;
            display: none;
        }
        .card.active {
            display: block;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: var(--text-muted);
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            color: white;
            font-size: 16px;
        }
        input:focus {
            outline: none;
            border-color: var(--accent-teal);
        }
        button.submit-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-teal);
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button.submit-btn:hover {
            background-color: #0f766e;
        }
        button.submit-btn:disabled {
            background-color: #334155;
            color: var(--text-muted);
            cursor: not-allowed;
        }
        .response-box {
            display: none;
            padding: 16px;
            border-radius: 6px;
            font-size: 14px;
            margin-top: 15px;
            white-space: pre-wrap;
            line-height: 1.5;
        }
        .success { background-color: #064e3b; color: #a7f3d0; border: 1px solid #047857; }
        .error { background-color: #7f1d1d; color: #fecaca; border: 1px solid #b91c1c; }
        
        /* Profile Display Badge Styling */
        .profile-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
            margin-top: 5px;
        }
        .badge-verified { background-color: var(--verified-green); color: #0f172a; }
        .badge-pending { background-color: var(--pending-orange); color: #0f172a; }
    </style>

    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>VOUCHGRID</h1>
        <p>Consensus Trust & Identity Architecture</p>
    </div>

    <div class="auth-banner">
        <span id="authText" class="auth-status">Pi Network: Connecting...</span>
        <button id="authBtn" class="auth-btn" style="display: none;" onclick="authenticatePiUser()">Sign In</button>
    </div>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('customerView', this)">Customer Lookup</button>
        <button class="tab-btn" onclick="withAuthCheck('operatorView', this)">Operator Portal</button>
    </div>

    <div id="customerView" class="card active">
        <h3 style="margin-top:0; color: var(--accent-teal);">Public Verification Engine</h3>
        <p style="color: var(--text-muted); font-size:14px; margin-bottom:20px;">Verify the status and consensus evaluation of any merchant instantly.</p>
        <div class="form-group">
            <label for="searchUsername">Enter Merchant Username</label>
            <input type="text" id="searchUsername" placeholder="e.g., mohammed_bauchi">
        </div>
        <button class="submit-btn" id="searchBtn" onclick="lookupMerchant()">Verify Merchant Credential</button>
        <div id="searchResponse" class="response-box"></div>
    </div>

    <div id="operatorView" class="card">
        <h3 style="margin-top:0; color: var(--accent-teal);">Attestation Entry Terminal</h3>
        <p style="color: var(--text-muted); font-size:14px; margin-bottom:20px;">Secure data ingestion node for field validation officers.</p>
        <form id="vouchForm">
            <div class="form-group">
                <label for="targetUsername">Target Merchant Username</label>
                <input type="text" id="targetUsername" required placeholder="e.g., mohammed_bauchi">
            </div>
            <div class="form-group">
                <label for="validatorUsername">Validator Operator ID</label>
                <input type="text" id="validatorUsername" required placeholder="e.g., operator_02" readonly>
            </div>
            <button type="submit" class="submit-btn" id="submitBtn" disabled>Submit Attestation Vouch</button>

            <button class="submit-btn" id="payBtn" onclick="triggerPiPayment()" style="background-color: #6366f1; margin-top: 10px;" type="button">
                Run Test Pi Payment
            </button>
    </form>
        <div id="vouchResponse" class="response-box"></div>
    </div>
</div>

<script>
/// --- 1. GLOBAL SYSTEM STATES ---
let isInitialized = false;
let isPiEngineReady = false;
let verifiedPiUser = null;

// --- 2. LIFE-CYCLE BOOT ENGAGEMENT ---
// Fixed: Marked async properly so await initPiNetwork() compiles seamlessly
window.addEventListener('DOMContentLoaded', async () => {
    console.log("[VouchGrid Grid] DOM Loaded. Initializing Pi Core Handshake safely...");
    
    // SAFETY TIMEOUT FALLBACK: Unlocks UI if the mobile browser freezes on initialization
    setTimeout(() => {
        const authStatusText = document.getElementById('authText');
        if (!isPiEngineReady && authStatusText && authStatusText.innerText === "Authenticating Session...") {
            console.warn("[VouchGrid Engine] Pi Core timeout. Activating developer fallback.");
            authStatusText.innerText = "Developer Mode (Sandbox Bypass)";
            
            const validatorInput = document.getElementById('validatorUsername');
            const submitBtn = document.getElementById('submitBtn');
            if (validatorInput) validatorInput.value = "sandbox_developer_ibrahim";
            if (submitBtn) submitBtn.disabled = false;
        }
    }, 4000);

    await initPiNetwork();
});

// --- 3. PLATFORM CORE INITIALIZATION ENGINE ---
async function initPiNetwork() {
    const authStatusText = document.getElementById('authText');
    const authButton = document.getElementById('authBtn');
    
    try {
        if (window.Pi) {
            if (authStatusText) authStatusText.innerText = "Authenticating Session...";
            
            console.log("[VouchGrid Grid] Awaiting Pi.init Promise layer...");
            await window.Pi.init({ version: "2.0", sandbox: true });
            
            isInitialized = true;
            isPiEngineReady = true;
            console.log("[VouchGrid Grid] Pi.init Promise resolved successfully.");
            
            await authenticatePiUser();
        } else {
            console.error("[VouchGrid Grid] window.Pi script resource not found.");
            if (authStatusText) authStatusText.innerText = "Pi SDK Script Missing";
            if (authButton) authButton.style.display = "block";
        }
    } catch (err) {
        console.error("[VouchGrid Grid] Critical Promise Initialization Failure:", err);
        if (authStatusText) authStatusText.innerText = "Connection Refused";
        if (authButton) authButton.style.display = "block";
    }
}

// --- 4. SECURE USER AUTHENTICATION NODES ---
async function authenticatePiUser() {
    const authStatusText = document.getElementById('authText');
    const authButton = document.getElementById('authBtn');
    const submitBtn = document.getElementById('submitBtn');
    const validatorInput = document.getElementById('validatorUsername');

    if (authStatusText) authStatusText.innerText = "Authenticating Session...";
    if (authButton) authButton.style.display = "none";

    try {
        console.log("[VouchGrid Grid] Triggering Pi.authenticate with expanded username and payments scopes...");
        const auth = await window.Pi.authenticate(['username', 'payments'], onIncompletePaymentFound);
        
        console.log("[VouchGrid Grid] Front-end token received. Shipping token to backend validation node...");
        
        const verifyRes = await fetch('/api/pi-auth', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ accessToken: auth.accessToken })
        });
        
        const verifyData = await verifyRes.json();

        if (verifyRes.ok && verifyData.success) {
            console.log("[VouchGrid Grid] Backend handshake validated successfully for:", verifyData.user.username);
            verifiedPiUser = verifyData.user;
            
            if (authStatusText) authStatusText.innerText = `Connected: @${verifyData.user.username}`;
            if (validatorInput) validatorInput.value = verifyData.user.username;
            if (submitBtn) submitBtn.disabled = false;
        } else {
            throw new Error(verifyData.error || "Backend verification node rejected auth signature.");
        }
    } catch (err) {
        console.error("[VouchGrid Grid] Secure Session Handshake Denied:", err);
        if (authStatusText) authStatusText.innerText = "Authentication Failed";
        if (authButton) authButton.style.display = "block";
        if (validatorInput) validatorInput.value = "";
    }
}

// --- 5. COMPREHENSIVE U2A PAYMENT TRANSFERS ---
document.getElementById('vouchForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const submitBtn = document.getElementById('submitBtn');
    const responseBox = document.getElementById('vouchResponse');
    const targetUsername = document.getElementById('targetUsername').value.trim();
    const validatorUsername = document.getElementById('validatorUsername').value.trim();

    submitBtn.disabled = true;
    submitBtn.innerText = "Initializing Pi Wallet Modal...";
    responseBox.style.display = "none";

    try {
        const paymentData = {
            amount: 0.1,
            memo: `VouchGrid Merchant Attestation Fee for @${targetUsername}`,
            metadata: { 
                targetMerchant: targetUsername,
                validatorOperator: validatorUsername 
            }
        };

        console.log("[VouchGrid Payments] Launching wallet payment interface...");
        
        await window.Pi.createPayment(paymentData, {
        onReadyForServerApproval: async (paymentId) => {
                console.log("[VouchGrid Payments] Payment created on ledger. ID:", paymentId);
                const res = await fetch('/api/pi-payment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'approve', paymentId })
                });
                return res.ok;
            },
        onReadyForServerCompletion: async (paymentId, txid) => {
                console.log("[VouchGrid Payments] User signed transaction. TxID:", txid);
                
               const res = await fetch('/api/pi-payment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        action: 'complete', 
                        paymentId, 
                        txid,
                        targetUsername,
                        validatorUsername
                    })
                });
                
                const finalData = await res.json();
                responseBox.style.display = "block";
                
                if (res.ok) {
                    responseBox.className = "response-box success";
                    responseBox.innerText = `Payment Complete & Attestation Approved!\nStatus: ${finalData.currentStatus || "SUCCESS"}\nConsensus Weight: ${finalData.vouchesCount || 1}/${finalData.requiredVouches || 3}`;
                } else {
                    throw new Error(finalData.error || "Failed to complete transaction database records.");
                }
            },
            onCancel: (paymentId) => {
                console.warn("[VouchGrid Payments] Transaction canceled by user:", paymentId);
                responseBox.className = "response-box error";
                responseBox.style.display = "block";
                responseBox.innerText = "Payment process canceled by user.";
                submitBtn.disabled = false;
                submitBtn.innerText = "Submit Attestation Vouch";
            },
            onError: (error, payment) => {
                console.error("[VouchGrid Payments] Critical Wallet Error:", error);
                responseBox.className = "response-box error";
                responseBox.style.display = "block";
                responseBox.innerText = `Wallet Exception: ${error.message || "Transaction aborted."}`;
                submitBtn.disabled = false;
                submitBtn.innerText = "Submit Attestation Vouch";
            }
        });

    } catch (err) {
        console.error("[VouchGrid Payments] Error lifecycle:", err);
        responseBox.className = "response-box error";
        responseBox.style.display = "block";
        responseBox.innerText = err.message || "Network Error.";
        submitBtn.disabled = false;
        submitBtn.innerText = "Submit Attestation Vouch";
    }
});

// Mandatory onIncompletePaymentFound handling
async function onIncompletePaymentFound(payment) {
    console.warn("[VouchGrid Payments] Unresolved transactional payload found. Clearing with engine:", payment.identifier);
    await fetch('/api/pi-payment', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'complete', paymentId: payment.identifier, txid: payment.transaction.txid, incompleteRecovery: true })
    });
}

// --- 6. DATA REGISTRY QUERY ARCHITECTURE ---
async function lookupMerchant() {
    const username = document.getElementById('searchUsername').value.trim();
    const searchBtn = document.getElementById('searchBtn');
    const responseBox = document.getElementById('searchResponse');

    if (!username) {
        alert("Please enter a username to look up.");
        return;
    }

    searchBtn.disabled = true;
    searchBtn.innerText = "Querying Cloud Grid...";
    responseBox.style.display = "none";

    try {
        const response = await fetch('/api/submit-vouch', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ targetUsername: username, validatorUsername: "PUBLIC_LOOKUP_QUERY" })
        });

        const data = await response.json();
        responseBox.style.display = "block";

        if (response.ok || data.user) {
            responseBox.className = "response-box success";
            const profile = data.user || data;
            
            let badgeClass = profile.currentStatus === 'VERIFIED' || profile.kycStatus === 'VERIFIED' ? 'badge-verified' : 'badge-pending';
            let statusText = profile.currentStatus || profile.kycStatus || "PENDING";
            let count = profile.vouchesCount !== undefined ? profile.vouchesCount : (profile.vouchesReceived ? profile.vouchesReceived.length : 0);
            let reqCount = profile.requiredVouches || 3;

            responseBox.innerHTML = `
                <strong>Merchant ID:</strong> @${username}<br>
                <strong>Network Status:</strong> <span class="profile-badge ${badgeClass}">${statusText}</span><br>
                <strong>Consensus Weight:</strong> ${count}/${reqCount} Attestations Verified
            `;
        } else {
            responseBox.className = "response-box error";
            responseBox.innerText = `System Notice: ${data.error || "No active record found."}`;
        }
    } catch (err) {
        responseBox.style.display = "block";
        responseBox.className = "response-box error";
        responseBox.innerText = `Network Failure: Failed to pull data from memory layer.`;
    } finally {
        searchBtn.disabled = false;
        searchBtn.innerText = "Verify Merchant Credential";
    }
}

// --- 7. INTERACTIVE VISUAL NAVIGATION FUNCTIONS ---
function switchTab(viewId, element) {
    document.querySelectorAll('.card').forEach(card => card.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    
    document.getElementById(viewId).classList.add('active');
    element.classList.add('active');
}

function withAuthCheck(viewId, element) {
    const validatorUsername = document.getElementById('validatorUsername').value;
    if (!validatorUsername) {
        alert("Please complete Pi Network authentication first to open the Operator Portal.");
        authenticatePiUser();
        return;
    }
    switchTab(viewId, element);
}
</script>

</body>
</html>
