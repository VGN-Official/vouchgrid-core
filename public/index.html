<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VouchGrid Core Network</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-teal: #0d9488;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --verified-green: #10b981;
            --pending-orange: #f59e0b;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 480px;
            margin-top: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        .header h1 {
            color: var(--accent-teal);
            margin: 0;
            font-size: 28px;
            letter-spacing: 1px;
        }
        .header p {
            color: var(--text-muted);
            margin: 5px 0 0 0;
            font-size: 14px;
        }
        /* Identity Banner */
        .auth-banner {
            background-color: var(--card-bg);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            width: 100%;
            box-sizing: border-box;
        }
        .auth-status {
            font-weight: 600;
        }
        .auth-btn {
            background-color: var(--accent-teal);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        /* Navigation Tabs Layout */
        .nav-tabs {
            display: flex;
            background-color: var(--card-bg);
            padding: 4px;
            border-radius: 8px;
            margin-bottom: 25px;
            border: 1px solid #334155;
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background-color: var(--accent-teal);
            color: white;
        }
        .card {
            background-color: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            margin-bottom: 20px;
            display: none;
        }
        .card.active {
            display: block;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: var(--text-muted);
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            color: white;
            font-size: 16px;
        }
        input:focus {
            outline: none;
            border-color: var(--accent-teal);
        }
        button.submit-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-teal);
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button.submit-btn:hover {
            background-color: #0f766e;
        }
        button.submit-btn:disabled {
            background-color: #334155;
            color: var(--text-muted);
            cursor: not-allowed;
        }
        .response-box {
            display: none;
            padding: 16px;
            border-radius: 6px;
            font-size: 14px;
            margin-top: 15px;
            white-space: pre-wrap;
            line-height: 1.5;
        }
        .success { background-color: #064e3b; color: #a7f3d0; border: 1px solid #047857; }
        .error { background-color: #7f1d1d; color: #fecaca; border: 1px solid #b91c1c; }
        
        /* Profile Display Badge Styling */
        .profile-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
            margin-top: 5px;
        }
        .badge-verified { background-color: var(--verified-green); color: #0f172a; }
        .badge-pending { background-color: var(--pending-orange); color: #0f172a; }
    </style>

    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>VOUCHGRID</h1>
        <p>Consensus Trust & Identity Architecture</p>
    </div>

    <div class="auth-banner">
        <span id="authText" class="auth-status">Pi Network: Connecting...</span>
        <button id="authBtn" class="auth-btn" style="display: none;" onclick="authenticatePiUser()">Sign In</button>
    </div>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('customerView', this)">Customer Lookup</button>
        <button class="tab-btn" onclick="withAuthCheck('operatorView', this)">Operator Portal</button>
    </div>

    <div id="customerView" class="card active">
        <h3 style="margin-top:0; color: var(--accent-teal);">Public Verification Engine</h3>
        <p style="color: var(--text-muted); font-size:14px; margin-bottom:20px;">Verify the status and consensus evaluation of any merchant instantly.</p>
        <div class="form-group">
            <label for="searchUsername">Enter Merchant Username</label>
            <input type="text" id="searchUsername" placeholder="e.g., mohammed_bauchi">
        </div>
        <button class="submit-btn" id="searchBtn" onclick="lookupMerchant()">Verify Merchant Credential</button>
        <div id="searchResponse" class="response-box"></div>
    </div>

    <div id="operatorView" class="card">
        <h3 style="margin-top:0; color: var(--accent-teal);">Attestation Entry Terminal</h3>
        <p style="color: var(--text-muted); font-size:14px; margin-bottom:20px;">Secure data ingestion node for field validation officers.</p>
        <form id="vouchForm">
            <div class="form-group">
                <label for="targetUsername">Target Merchant Username</label>
                <input type="text" id="targetUsername" required placeholder="e.g., mohammed_bauchi">
            </div>
            <div class="form-group">
                <label for="validatorUsername">Validator Operator ID</label>
                <input type="text" id="validatorUsername" required placeholder="e.g., operator_02" readonly>
            </div>
            <button type="submit" class="submit-btn" id="submitBtn" disabled>Submit Attestation Vouch</button>

            <button class="submit-btn" id="payBtn" onclick="triggerPiPayment()" style="background-color: #6366f1; margin-top: 10px;" type="button">
                Run Test Pi Payment
            </button>
    </form>
        <div id="vouchResponse" class="response-box"></div>
    </div>
</div>

<script>
    let isInitialized = false;

    // Tab Navigation Logic
    function switchTab(viewId, element) {
        document.querySelectorAll('.card').forEach(card => card.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        
        document.getElementById(viewId).classList.add('active');
        element.classList.add('active');
    }

    // Access Protection Check
    function withAuthCheck(viewId, element) {
        const validatorUsername = document.getElementById('validatorUsername').value;
        if (!validatorUsername) {
            alert("Please complete Pi Network authentication first to open the Operator Portal.");
            authenticatePiUser();
            return;
        }
        switchTab(viewId, element);
    }

    // Public Status Lookup Logic
    async function lookupMerchant() {
        const username = document.getElementById('searchUsername').value.trim();
        const searchBtn = document.getElementById('searchBtn');
        const responseBox = document.getElementById('searchResponse');

        if (!username) {
            alert("Please enter a username to look up.");
            return;
        }

        searchBtn.disabled = true;
        searchBtn.innerText = "Querying Cloud Grid...";
        responseBox.style.display = "none";

        try {
        const response = await fetch('/api/submit-vouch', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ targetUsername: username, validatorUsername: "PUBLIC_LOOKUP_QUERY" })
            });

            const data = await response.json();
            responseBox.style.display = "block";

            if (response.ok || data.user) {
                responseBox.className = "response-box success";
                const profile = data.user || data;
                
                let badgeClass = profile.currentStatus === 'VERIFIED' || profile.kycStatus === 'VERIFIED' ? 'badge-verified' : 'badge-pending';
                let statusText = profile.currentStatus || profile.kycStatus || "PENDING";
                let count = profile.vouchesCount !== undefined ? profile.vouchesCount : (profile.vouchesReceived ? profile.vouchesReceived.length : 0);
                let reqCount = profile.requiredVouches || 3;

                responseBox.innerHTML = `
                    <strong>Merchant ID:</strong> @${username}<br>
                    <strong>Network Status:</strong> <span class="profile-badge ${badgeClass}">${statusText}</span><br>
                    <strong>Consensus Weight:</strong> ${count}/${reqCount} Attestations Verified
                `;
            } else {
                responseBox.className = "response-box error";
                responseBox.innerText = `System Notice: ${data.error || "No active record found."}`;
            }
        } catch (err) {
            responseBox.style.display = "block";
            responseBox.className = "response-box error";
            responseBox.innerText = `Network Failure: Failed to pull data from memory layer.`;
        } finally {
            searchBtn.disabled = false;
            searchBtn.innerText = "Verify Merchant Credential";
        }
    }

    // Ingestion Terminal Logic
    document.getElementById('vouchForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        const responseBox = document.getElementById('vouchResponse');
        
        const targetUsername = document.getElementById('targetUsername').value.trim();
        const validatorUsername = document.getElementById('validatorUsername').value.trim();

        submitBtn.disabled = true;
        submitBtn.innerText = "Processing Cloud Handshake...";
        responseBox.style.display = "none";

        try {
            const response = await fetch('/api/submit-vouch', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ targetUsername, validatorUsername })
            });

            const data = await response.json();
            responseBox.style.display = "block";

            if (response.ok) {
                responseBox.className = "response-box success";
                responseBox.innerText = `Attestation Approved!\nMessage: ${data.message}\nStatus: ${data.currentStatus}\nConsensus: ${data.vouchesCount}/${data.requiredVouches}`;
            } else {
                responseBox.className = "response-box error";
                responseBox.innerText = `Security Exception: ${data.error}`;
            }
        } catch (err) {
            responseBox.style.display = "block";
            responseBox.className = "response-box error";
            responseBox.innerText = `Network Error: Ingestion node failure.`;
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = "Submit Attestation Vouch";
        }
    });

    // Promise-compliant SDK Initialization Engine
    async function initPiNetwork() {
        const authText = document.getElementById('authText');
        const authBtn = document.getElementById('authBtn');
        try {
            if (window.Pi) {
                // Treat Pi.init as a clean Promise and await it completely
                await window.Pi.init({ version: "2.0", sandbox: true });
                isInitialized = true;
                // Auto-trigger authentication right out of the gate
                await authenticatePiUser();
            } else {
                authText.innerText = "Pi SDK Missing";
                authBtn.style.display = "block";
            }
        } catch (err) {
            console.error("Initialization error:", err);
            authText.innerText = "Pi Init Failed";
            authBtn.style.display = "block";
        }
    }

    // Dedicated Authentication Handshake Method
    async function authenticatePiUser() {
        const authText = document.getElementById('authText');
        const authBtn = document.getElementById('authBtn');
        const submitBtn = document.getElementById('submitBtn');
        const validatorInput = document.getElementById('validatorUsername');

        if (!isInitialized) {
            try {
                if (window.Pi) {
                    await window.Pi.init({ version: "2.0", sandbox: true });
                    isInitialized = true;
                } else {
                    throw new Error("Pi SDK target context unavailable");
                }
            } catch (initErr) {
                authText.innerText = "Pi Browser Context Required";
                authBtn.style.display = "block";
                return;
            }
        }

        authText.innerText = "Authenticating Session...";
        authBtn.style.display = "none";

        try {
            // Call official authenticate loop using 'username' scope criteria
            const auth = await window.Pi.authenticate(['username'], onIncompletePaymentFound);
            
            // Ship access token up to server-side edge validator route
            const verifyRes = await fetch('/api/pi-auth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ accessToken: auth.accessToken })
            });
            const verifyData = await verifyRes.json();

            if (verifyRes.ok && verifyData.success) {
                authText.innerText = `Connected: @${verifyData.user.username}`;
                validatorInput.value = verifyData.user.username;
                submitBtn.disabled = false;
            } else {
                throw new Error(verifyData.error || "Backend verification failed");
            }
        } catch (err) {
            console.error("Auth routing failure:", err);
            authText.innerText = "Authentication Failed";
            authBtn.style.display = "block";
            submitBtn.disabled = true;
            validatorInput.value = "";
        }
    }

    function onIncompletePaymentFound(payment) {
        console.log("Found an incomplete payment reference:", payment);
    }
 
    // Payment execution script using validated environment state
    async function triggerPiPayment() {
        const payBtn = document.getElementById('payBtn');
        
        if (!window.Pi) {
            alert("Pi SDK not detected. Run this node inside the official Pi Browser environment.");
            return;
        }

        payBtn.disabled = true;
        payBtn.innerText = "Configuring Cryptographic Scope...";

        try {
            const payment = await window.Pi.createPayment({
                amount: 1,
                memo: "VouchGrid System Test Verification Node Payment",
                metadata: { test: "initial_setup" }
            }, {
                onReadyForServerApproval: async (paymentId) => {
                    console.log("Payment created. Requesting backend approval for ID:", paymentId);
                    await fetch('/api/pi-payment', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'approve', paymentId })
                    });
                },
                onReadyForServerCompletion: async (paymentId, txid) => {
                    console.log("User signed transaction. Finalizing ID:", paymentId);
                    await fetch('/api/pi-payment', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'complete', paymentId, txid })
                    });
                    alert("Transaction fully complete! Check your Developer Portal.");
                },
                onCancel: (paymentId) => {
                    console.log("Payment canceled by user:", paymentId);
                    payBtn.disabled = false;
                    payBtn.innerText = "Run Test Pi Payment";
                },
                onError: (error, paymentId) => {
                    console.error("Payment error encountered:", error, paymentId);
                    alert(`Payment Window Error: ${error.message || error}`);
                    payBtn.disabled = false;
                    payBtn.innerText = "Run Test Pi Payment";
                }
            });

        } catch (err) {
            console.error("SDK processing execution hit anomaly:", err);
            alert(`SDK Exception: ${err.message || err}`);
            payBtn.disabled = false;
            payBtn.innerText = "Run Test Pi Payment";
        }
    }


    
   // --- GLOBAL REVOLUTION STATES ---
let isPiEngineReady = false;
let verifiedPiUser = null;

// Behavior Requirement: Trigger Pi authentication automatically when the app loads
window.addEventListener('DOMContentLoaded', async () => {
    console.log("[VouchGrid Grid] DOM Loaded. Initializing Pi Core Handshake...");
    await initPiNetwork();
});

// Behavior Requirement: Treat Pi.init(...) as a Promise; await it fully
async function initPiNetwork() {
    const authStatusText = document.getElementById('authText');
    const authButton = document.getElementById('authBtn');
    
    try {
        if (window.Pi) {
            if (authStatusText) authStatusText.innerText = "Authenticating Session...";
            
            console.log("[VouchGrid Grid] Awaiting Pi.init Promise layer...");
            // Strictly awaiting Pi.init as a Promise
            await window.Pi.init({ version: "2.0", sandbox: true });
            
            isPiEngineReady = true;
            console.log("[VouchGrid Grid] Pi.init Promise resolved successfully.");
            
            // Auto-trigger authentication once initialized
            await authenticatePiUser();
        } else {
            console.error("[VouchGrid Grid] window.Pi script resource not found.");
            if (authStatusText) authStatusText.innerText = "Pi SDK Script Missing";
            if (authButton) authButton.style.display = "block";
        }
    } catch (err) {
        console.error("[VouchGrid Grid] Critical Promise Initialization Failure:", err);
        if (authStatusText) authStatusText.innerText = "Connection Refused";
        if (authButton) authButton.style.display = "block";
    }
}

// Behavior Requirement: Use the "username" scope and authenticate seamlessly
async function authenticatePiUser() {
    const authStatusText = document.getElementById('authText');
    const authButton = document.getElementById('authBtn');
    const submitBtn = document.getElementById('submitBtn');
    const validatorInput = document.getElementById('validatorUsername');

    if (!isPiEngineReady) {
        console.warn("[VouchGrid Grid] Authentication bypassed promise resolution safety gate. Re-initializing...");
        if (authStatusText) authStatusText.innerText = "Reinitializing Core...";
        try {
            await window.Pi.init({ version: "2.0", sandbox: true });
            isPiEngineReady = true;
        } catch (e) {
            if (authStatusText) authStatusText.innerText = "Initialization Failed";
            if (authButton) authButton.style.display = "block";
            return;
        }
    }

    if (authStatusText) authStatusText.innerText = "Authenticating Session...";
    if (authButton) authButton.style.display = "none";

    try {
        console.log("[VouchGrid Grid] Triggering Pi.authenticate with ['username'] scope...");
        // Requesting 'username' scope as requested by App Studio documentation
        const auth = await window.Pi.authenticate(['username'], onIncompletePaymentFound);
        
        console.log("[VouchGrid Grid] Front-end token received. Shipping token to backend validation node...");
        
        // Behavior Requirement: Send the returned access token to the backend for signature verification
        const verifyRes = await fetch('/api/pi-auth', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ accessToken: auth.accessToken })
        });
        
        const verifyData = await verifyRes.json();

        if (verifyRes.ok && verifyData.success) {
            console.log("[VouchGrid Grid] Backend handshake validated successfully for:", verifyData.user.username);
            verifiedPiUser = verifyData.user;
            
            // Seamless UI Synchronizations
            if (authStatusText) authStatusText.innerText = `Connected: @${verifyData.user.username}`;
            if (validatorInput) validatorInput.value = verifyData.user.username;
            if (submitBtn) submitBtn.disabled = false;
        } else {
            throw new Error(verifyData.error || "Backend verification node rejected auth signature.");
        }
    } catch (err) {
        console.error("[VouchGrid Grid] Secure Session Handshake Denied:", err);
        if (authStatusText) authStatusText.innerText = "Authentication Failed";
        if (authButton) authButton.style.display = "block";
        if (submitBtn) submitBtn.disabled = true;
        if (validatorInput) validatorInput.value = "";
    }
}

function onIncompletePaymentFound(payment) {
    console.warn("[VouchGrid Grid] Critical tracking alert: Incomplete payment sequence discovered:", payment);
}

// Keep your exact UX Tab routing structure safely intact
function switchTab(viewId, element) {
    document.querySelectorAll('.card').forEach(card => card.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById(viewId).classList.add('active');
    element.classList.add('active');
}

// Integrated safety wrapper matching your new state verification mechanics
function withAuthCheck(viewId, element) {
    const validatorUsername = document.getElementById('validatorUsername')?.value;
    if (!validatorUsername) {
        alert("Please complete Pi Network authentication first to open the Operator Portal.");
        authenticatePiUser();
        return;
    }
    switchTab(viewId, element);
}

// Keep your exact, working Upstash backend data fetching functions completely untouched below
async function lookupMerchant() {
    const username = document.getElementById('searchUsername').value.trim();
    const searchBtn = document.getElementById('searchBtn');
    const responseBox = document.getElementById('searchResponse');

    if (!username) return alert("Please enter a username.");

    searchBtn.disabled = true;
    searchBtn.innerText = "Querying Cloud Grid...";
    responseBox.style.display = "none";

    try {
        const response = await fetch('/api/submit-vouch', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ targetUsername: username, validatorUsername: "PUBLIC_LOOKUP_QUERY" })
        });

        const data = await response.json();
        responseBox.style.display = "block";

        if (response.ok || data.user) {
            responseBox.className = "response-box success";
            const profile = data.user || data;
            let badgeClass = profile.currentStatus === 'VERIFIED' ? 'badge-verified' : 'badge-pending';
            responseBox.innerHTML = `
                <strong>Merchant ID:</strong> @${username}<br>
                <strong>Network Status:</strong> <span class="profile-badge ${badgeClass}">${profile.currentStatus || "PENDING"}</span><br>
                <strong>Consensus Weight:</strong> ${profile.vouchesCount || 0}/${profile.requiredVouches || 3} Attestations Verified
            `;
        } else {
            responseBox.className = "response-box error";
            responseBox.innerText = `System Notice: ${data.error || "No active record found."}`;
        }
    } catch (err) {
        responseBox.style.display = "block";
        responseBox.className = "response-box error";
        responseBox.innerText = `Network Failure.`;
    } finally {
        searchBtn.disabled = false;
        searchBtn.innerText = "Verify Merchant Credential";
    }
}

document.getElementById('vouchForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const submitBtn = document.getElementById('submitBtn');
    const responseBox = document.getElementById('vouchResponse');
    const targetUsername = document.getElementById('targetUsername').value.trim();
    const validatorUsername = document.getElementById('validatorUsername').value.trim();

    submitBtn.disabled = true;
    submitBtn.innerText = "Processing Cloud Handshake...";
    responseBox.style.display = "none";

    try {
        const response = await fetch('/api/submit-vouch', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ targetUsername, validatorUsername })
        });

        const data = await response.json();
        responseBox.style.display = "block";

        if (response.ok) {
            responseBox.className = "response-box success";
            responseBox.innerText = `Attestation Approved!\nStatus: ${data.currentStatus}\nConsensus: ${data.vouchesCount}/${data.requiredVouches}`;
        } else {
            responseBox.className = "response-box error";
            responseBox.innerText = `Security Exception: ${data.error}`;
        }
    } catch (err) {
        responseBox.style.display = "block";
        responseBox.className = "response-box error";
        responseBox.innerText = `Network Error.`;
    } finally {
        submitBtn.disabled = false;
        submitBtn.innerText = "Submit Attestation Vouch";
    }
});

window.addEventListener('DOMContentLoaded', initPiNetwork);

</script>

</body>
</html>
