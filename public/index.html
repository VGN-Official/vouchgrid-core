<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VouchGrid Core Network</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-teal: #0d9488;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --verified-green: #10b981;
            --pending-orange: #f59e0b;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 480px;
            margin-top: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        .header h1 {
            color: var(--accent-teal);
            margin: 0;
            font-size: 28px;
            letter-spacing: 1px;
        }
        .header p {
            color: var(--text-muted);
            margin: 5px 0 0 0;
            font-size: 14px;
        }
        /* Navigation Tabs Layout */
        .nav-tabs {
            display: flex;
            background-color: var(--card-bg);
            padding: 4px;
            border-radius: 8px;
            margin-bottom: 25px;
            border: 1px solid #334155;
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background-color: var(--accent-teal);
            color: white;
        }
        .card {
            background-color: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            margin-bottom: 20px;
            display: none;
        }
        .card.active {
            display: block;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: var(--text-muted);
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            color: white;
            font-size: 16px;
        }
        input:focus {
            outline: none;
            border-color: var(--accent-teal);
        }
        button.submit-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-teal);
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button.submit-btn:hover {
            background-color: #0f766e;
        }
        button.submit-btn:disabled {
            background-color: #334155;
            color: var(--text-muted);
            cursor: not-allowed;
        }
        .response-box {
            display: none;
            padding: 16px;
            border-radius: 6px;
            font-size: 14px;
            margin-top: 15px;
            white-space: pre-wrap;
            line-height: 1.5;
        }
        .success { background-color: #064e3b; color: #a7f3d0; border: 1px solid #047857; }
        .error { background-color: #7f1d1d; color: #fecaca; border: 1px solid #b91c1c; }
        
        /* Profile Display Badge Styling */
        .profile-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
            margin-top: 5px;
        }
        .badge-verified { background-color: var(--verified-green); color: #0f172a; }
        .badge-pending { background-color: var(--pending-orange); color: #0f172a; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>VOUCHGRID</h1>
        <p>Consensus Trust & Identity Architecture</p>
    </div>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('customerView', this)">Customer Lookup</button>
        <button class="tab-btn" onclick="switchTab('operatorView', this)">Operator Portal</button>
    </div>

    <div id="customerView" class="card active">
        <h3 style="margin-top:0; color: var(--accent-teal);">Public Verification Engine</h3>
        <p style="color: var(--text-muted); font-size:14px; margin-bottom:20px;">Verify the status and consensus evaluation of any merchant instantly.</p>
        <div class="form-group">
            <label for="searchUsername">Enter Merchant Username</label>
            <input type="text" id="searchUsername" placeholder="e.g., mohammed_bauchi">
        </div>
        <button class="submit-btn" id="searchBtn" onclick="lookupMerchant()">Verify Merchant Credential</button>
        <div id="searchResponse" class="response-box"></div>
    </div>

    <div id="operatorView" class="card">
        <h3 style="margin-top:0; color: var(--accent-teal);">Attestation Entry Terminal</h3>
        <p style="color: var(--text-muted); font-size:14px; margin-bottom:20px;">Secure data ingestion node for field validation officers.</p>
        <form id="vouchForm">
            <div class="form-group">
                <label for="targetUsername">Target Merchant Username</label>
                <input type="text" id="targetUsername" required placeholder="e.g., mohammed_bauchi">
            </div>
            <div class="form-group">
                <label for="validatorUsername">Validator Operator ID</label>
                <input type="text" id="validatorUsername" required placeholder="e.g., operator_02">
            </div>
            <button type="submit" class="submit-btn" id="submitBtn">Submit Attestation Vouch</button>
        </form>
        <div id="vouchResponse" class="response-box"></div>
    </div>
</div>

<script>
    // Tab Navigation Logic
    function switchTab(viewId, element) {
        document.querySelectorAll('.card').forEach(card => card.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        
        document.getElementById(viewId).classList.add('active');
        element.classList.add('active');
    }

    // NEW: Public Status Lookup Logic (Uses a mock GET or handles reading properly)
    async function lookupMerchant() {
        const username = document.getElementById('searchUsername').value.trim();
        const searchBtn = document.getElementById('searchBtn');
        const responseBox = document.getElementById('searchResponse');

        if (!username) {
            alert("Please enter a username to look up.");
            return;
        }

        searchBtn.disabled = true;
        searchBtn.innerText = "Querying Cloud Grid...";
        responseBox.style.display = "none";

        try {
            // We use POST here because our api route is securely locked to POST methods
            const response = await fetch('/api/submit-vouch', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                // Sending an invalid validator bypasses changes but loads existing profile data structures!
                body: JSON.stringify({ targetUsername: username, validatorUsername: "PUBLIC_LOOKUP_QUERY" })
            });

            const data = await response.json();
            responseBox.style.display = "block";

            if (response.ok || data.user) {
                responseBox.className = "response-box success";
                const profile = data.user || data;
                
                let badgeClass = profile.currentStatus === 'VERIFIED' || profile.kycStatus === 'VERIFIED' ? 'badge-verified' : 'badge-pending';
                let statusText = profile.currentStatus || profile.kycStatus || "PENDING";
                let count = profile.vouchesCount !== undefined ? profile.vouchesCount : (profile.vouchesReceived ? profile.vouchesReceived.length : 0);
                let reqCount = profile.requiredVouches || 3;

                responseBox.innerHTML = `
                    <strong>Merchant ID:</strong> @${username}<br>
                    <strong>Network Status:</strong> <span class="profile-badge ${badgeClass}">${statusText}</span><br>
                    <strong>Consensus Weight:</strong> ${count}/${reqCount} Attestations Verified
                `;
            } else {
                responseBox.className = "response-box error";
                responseBox.innerText = `System Notice: ${data.error || "No active record found."}`;
            }
        } catch (err) {
            responseBox.style.display = "block";
            responseBox.className = "response-box error";
            responseBox.innerText = `Network Failure: Failed to pull data from memory layer.`;
        } finally {
            searchBtn.disabled = false;
            searchBtn.innerText = "Verify Merchant Credential";
        }
    }

    // Ingestion Terminal Logic
    document.getElementById('vouchForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        const responseBox = document.getElementById('vouchResponse');
        
        const targetUsername = document.getElementById('targetUsername').value.trim();
        const validatorUsername = document.getElementById('validatorUsername').value.trim();

        submitBtn.disabled = true;
        submitBtn.innerText = "Processing Cloud Handshake...";
        responseBox.style.display = "none";

        try {
            const response = await fetch('/api/submit-vouch', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ targetUsername, validatorUsername })
            });

            const data = await response.json();
            responseBox.style.display = "block";

            if (response.ok) {
                responseBox.className = "response-box success";
                responseBox.innerText = `Attestation Approved!\nMessage: ${data.message}\nStatus: ${data.currentStatus}\nConsensus: ${data.vouchesCount}/${data.requiredVouches}`;
            } else {
                responseBox.className = "response-box error";
                responseBox.innerText = `Security Exception: ${data.error}`;
            }
        } catch (err) {
            responseBox.style.display = "block";
            responseBox.className = "response-box error";
            responseBox.innerText = `Network Error: Ingestion node failure.`;
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = "Submit Attestation Vouch";
        }
    });
</script>

</body>
</html>
